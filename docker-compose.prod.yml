# Продовый стек на VPS: приложение + PostgreSQL в одной Docker-сети.
# Секреты и пароль БД берутся из .env на сервере (см. .env.production.example) —
# сам файл .env на сервере в git не попадает.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: teg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: teg_saas
    # docker-compose.yml (базовый, для локальной разработки) публикует 5432
    # на хост для прямого psql-доступа. Списки при мердже нескольких -f
    # компоуз-файлов конкатенируются, а не заменяются — без явного сброса
    # тут прод-БД оказывается доступна из интернета на 5432 (реальный
    # инцидент 2026-07-19: обнаружено после обычного деплоя с обоими -f
    # флагами, как и предписано; порт был закрыт только потому, что раньше
    # где-то db поднимался без базового файла). !reset — принудительно
    # пустой список портов независимо от порядка/состава -f флагов.
    ports: !reset []
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teg -d teg_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://teg:${POSTGRES_PASSWORD}@db:5432/teg_saas?schema=public
    depends_on:
      db:
        condition: service_healthy
    # public/uploads это bind-mount на папку домена (не именованный volume) —
    # владелец на хосте это пользователь сайта в ISPmanager (id <имя_сайта>),
    # не UID образа (rentos, 100:101). Без этого mkdir внутри контейнера
    # падает EACCES, т.к. bind-mount живёт под host-правами, не docker'овскими.
    user: "${SITE_UID:-1000}:${SITE_GID:-1000}"
    volumes:
      - ./public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db_data:
