services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: teg
      POSTGRES_PASSWORD: teg
      POSTGRES_DB: teg_saas
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teg -d teg_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
