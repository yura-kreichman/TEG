# Шаблон для /etc/nginx/sites-available/rentos365.app.conf на VPS.
# После первого запуска certbot допишет блок 443/ssl_certificate сам
# (certbot --nginx -d rentos365.app -d www.rentos365.app).

server {
    listen 80;
    listen [::]:80;
    server_name rentos365.app www.rentos365.app;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 8m;
}
