# Сервер управляется ISPmanager 5 (не голый nginx) — vhost для my.rentos365.app
# генерируется панелью в /etc/nginx/vhosts/md33/my.rentos365.app.conf и
# перезаписывается при любом изменении домена через панель, поэтому этот
# location-блок правится не в панельном файле, а через официальную точку
# расширения панели — include /etc/nginx/vhosts-resources/my.rentos365.app/*.conf,
# который сам панельный vhost уже подключает.
#
# Установлен на сервере как /etc/nginx/vhosts-resources/my.rentos365.app/10-proxy.conf
#
# Панельный location / содержит ВЛОЖЕННЫЙ location для расширений
# (js/css/png/svg/woff2/...), который на практике перехватывает такие запросы
# раньше простого sibling-regex "location ~ ^/" — родные ассеты Next.js
# (_next/*.js, *.css, иконки) 404-или в пустой докрут панели вместо проксирования
# (обнаружено и подтверждено на реальном сервере 2026-07-11, до этого была
# версия только с "location ~ ^/", которая ломала все статические ассеты).
# Второй "location /" нельзя — nginx: duplicate location error. Рабочее
# решение — ^~-префиксы: они гарантированно выигрывают у ЛЮБОГО regex,
# вложенного или нет, если это самый длинный совпавший префикс (ключевое
# отличие от regex-location, где такой гарантии по вложенности нет).
# "location ~ ^/" в конце остаётся как catch-all для путей без расширений
# (/admin, /login, /reports/[id] и т.п.) — там проблемы не было, но убирать
# незачем, он единственный ловит всё остальное.

location ^~ /_next/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location ^~ /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location = /icon.png { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
location = /apple-icon.png { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
location = /manifest.webmanifest { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
location = /sw.js { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
location ~ ^/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

client_max_body_size 8m;

# /uploads/ отдаётся напрямую как статика (alias), НЕ проксируется на
# Next.js — next start кэширует список файлов public/ на старте процесса,
# новые загруженные фото не видны без рестарта контейнера, пока не
# перезапущен (обнаружено 2026-07-11: фото оператора не отображалось,
# хотя физически лежало на диске, до restart контейнера). Отдавать через
# nginx-alias быстрее и полностью обходит это ограничение.
location ^~ /uploads/ {
    alias /var/www/md33/data/www/my.rentos365.app/public/uploads/;
}
