# Сервер управляется ISPmanager 5 (не голый nginx) — vhost для my.rentos365.app
# генерируется панелью в /etc/nginx/vhosts/md33/my.rentos365.app.conf и
# перезаписывается при любом изменении домена через панель, поэтому этот
# location-блок правится не в панельном файле, а через официальную точку
# расширения панели — include /etc/nginx/vhosts-resources/my.rentos365.app/*.conf,
# который сам панельный vhost уже подключает.
#
# Установлен на сервере как /etc/nginx/vhosts-resources/my.rentos365.app/10-proxy.conf
#
# Панельный location / (PHP/статика) остаётся в файле как есть — не трогаем
# его напрямую. Вместо второго "location /" (что дало бы nginx: duplicate
# location error) используем location ~ ^/ — это regex-location, у него по
# правилам nginx приоритет выше над panel-овским префиксным "location /"
# (если только префиксный не помечен ^~, тут не помечен), так что он реально
# перехватывает все запросы, ничего не ломая в самом панельном файле.

location ~ ^/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

client_max_body_size 8m;
